apiVersion: apps/v1
kind: Deployment
metadata:
  name: termix
  namespace: termix
  labels:
    app: termix
spec:
  replicas: 2
  selector:
    matchLabels:
      app: termix
  template:
    metadata:
      labels:
        app: termix
    spec:
      imagePullSecrets:
        - name: dockerhub-pull-secret
      containers:
        - name: termix
          image: docker.io/DOCKER_HUB_USERNAME/termix:PIPELINE_IMAGE_TAG
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 30001
              name: health
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 30001
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 30001
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: termix-config
            - secretRef:
                name: termix-secrets
                optional: false
          volumeMounts:
            - name: termix-data
              mountPath: /app/data
      volumes:
        - name: termix-data
          persistentVolumeClaim:
            claimName: termix-data
