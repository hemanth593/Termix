name: Deploy to Kubernetes

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version (e.g., 1.8.0)"
        required: true
        type: string
      build_type:
        description: "Build type"
        required: true
        type: choice
        options:
          - Production
          - Development
      rollback:
        description: "Roll back to previous revision without building"
        required: false
        type: boolean
        default: false

env:
  K8S_NAMESPACE: termix
  DEPLOYMENT_NAME: termix

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      should_rollback: ${{ steps.check.outputs.should_rollback }}
      build_type: ${{ steps.check.outputs.build_type }}
      image_tag: ${{ steps.check.outputs.image_tag }}
    steps:
      - name: Check branch and inputs
        id: check
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "::error::Releases must be run from the main branch"
            exit 1
          fi

          # Determine if this is a rollback
          if [[ "${{ github.event.inputs.rollback }}" == "true" ]]; then
            echo "should_rollback=true" >> $GITHUB_OUTPUT
          else
            echo "should_rollback=false" >> $GITHUB_OUTPUT
          fi

          # Determine build type (default to Production for push events)
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [[ -z "$BUILD_TYPE" ]]; then
            BUILD_TYPE="Production"
          fi
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT

          # Set image tag
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image_tag=$SHORT_SHA" >> $GITHUB_OUTPUT

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.should_rollback == 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ needs.validate.outputs.build_type == 'Production' }}
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.SERVICE_NAME }}:${{ needs.validate.outputs.image_tag }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.SERVICE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: |
      needs.validate.outputs.should_rollback == 'false' &&
      needs.validate.outputs.build_type == 'Production'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Verify cluster connectivity
        run: |
          if ! kubectl cluster-info; then
            echo "::error::Failed to connect to Kubernetes cluster"
            exit 1
          fi

      - name: Create namespace if not exists
        run: kubectl apply -f k8s/namespace.yml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/configmap.yml
          kubectl apply -f k8s/pvc.yml
          kubectl apply -f k8s/service.yml
          kubectl apply -f k8s/deployment.yml

      - name: Update deployment image
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            ${{ secrets.SERVICE_NAME }}=${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.SERVICE_NAME }}:${{ needs.validate.outputs.image_tag }} \
            -n ${{ env.K8S_NAMESPACE }}

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [validate, deploy]
    steps:
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Wait for rollout to complete
        run: |
          if ! kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} --timeout=300s; then
            echo "::error::Deployment rollout timed out after 300 seconds"
            exit 1
          fi

      - name: Verify pod count
        run: |
          EXPECTED_REPLICAS=$(kubectl get deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.spec.replicas}')
          READY_PODS=$(kubectl get deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.status.readyReplicas}')

          if [[ "$READY_PODS" != "$EXPECTED_REPLICAS" ]]; then
            echo "::error::Pod count mismatch: expected $EXPECTED_REPLICAS, got $READY_PODS"
            exit 1
          fi
          echo "✓ All $READY_PODS/$EXPECTED_REPLICAS pods are ready"

      - name: Verify running image
        run: |
          EXPECTED_IMAGE="${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.SERVICE_NAME }}:${{ needs.validate.outputs.image_tag }}"
          RUNNING_IMAGES=$(kubectl get pods -n ${{ env.K8S_NAMESPACE }} \
            -l app=${{ secrets.SERVICE_NAME }} \
            -o jsonpath='{.items[*].spec.containers[0].image}')

          for IMAGE in $RUNNING_IMAGES; do
            if [[ "$IMAGE" != "$EXPECTED_IMAGE" ]]; then
              echo "::error::Image mismatch: expected $EXPECTED_IMAGE, got $IMAGE"
              exit 1
            fi
          done
          echo "✓ All pods running correct image: $EXPECTED_IMAGE"

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: [validate, verify]
    if: |
      always() &&
      (needs.verify.result == 'failure' || needs.validate.outputs.should_rollback == 'true')
    steps:
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Check previous revision exists
        run: |
          REVISION_COUNT=$(kubectl rollout history deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} | tail -n +2 | grep -c .)

          if [[ "$REVISION_COUNT" -lt 2 ]]; then
            echo "::error::No previous revision available for rollback"
            exit 1
          fi

      - name: Execute rollback
        run: |
          echo "Rolling back deployment/${{ env.DEPLOYMENT_NAME }} in namespace ${{ env.K8S_NAMESPACE }}"
          kubectl rollout undo deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollback to complete
        run: |
          if ! timeout 120 kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.K8S_NAMESPACE }}; then
            echo "::error::Rollback did not complete within 120 seconds"
            exit 1
          fi

      - name: Report rollback status
        run: |
          CURRENT_REVISION=$(kubectl rollout history deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} | tail -1 | awk '{print $1}')
          echo "✓ Rollback successful. Current revision: $CURRENT_REVISION"
          echo "::notice::Deployment rolled back to revision $CURRENT_REVISION"
